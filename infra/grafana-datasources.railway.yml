apiVersion: 1

datasources:
  - name: Prometheus
    uid: PBFA97CFB590B2093
    type: prometheus
    access: proxy
    url: http://promethus.railway.internal:9090
    isDefault: true
    editable: true

  # Railway Variables에서 grafana 서비스에 PGHOST/PGPORT/PGUSER/PGPASSWORD/PGDATABASE를
  # Postgres 서비스 reference(${{Postgres.PGHOST}} 등)로 주입해야 한다.
  - name: PostgreSQL
    uid: transit-hub-postgres
    type: postgres
    access: proxy
    url: $PGHOST:$PGPORT
    user: $PGUSER
    jsonData:
      database: $PGDATABASE
      sslmode: require
      postgresVersion: 1600
      maxOpenConns: 5
    secureJsonData:
      password: $PGPASSWORD
    editable: true
