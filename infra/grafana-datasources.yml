apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: PostgreSQL
    type: postgres
    access: proxy
    url: postgres:5432
    user: user
    jsonData:
      database: transit_hub
      sslmode: disable
      maxOpenConns: 5
    secureJsonData:
      password: password
    editable: true
