##
## 정왕 교통 허브 — nginx 리버스 프록시 (프로덕션 참조 설정)
## 실제 배포 시 도메인, SSL 인증서 경로를 채운 뒤 사용한다.
##

server_tokens off;   # nginx 버전 노출 차단

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name example.com;          # 실제 도메인으로 교체
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name example.com;          # 실제 도메인으로 교체

    # SSL 인증서 (Let's Encrypt 등으로 발급)
    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 보안 헤더
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         DENY;
    add_header X-XSS-Protection        "1; mode=block";
    add_header Referrer-Policy         strict-origin-when-cross-origin;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://dapi.kakao.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.daumcdn.net https://*.kakao.com; connect-src 'self' https://dapi.kakao.com; frame-ancestors 'none';" always;

    # /metrics — 외부 노출 차단
    location /metrics {
        deny all;
    }

    # /api/v1/admin — 관리자 API: 허용 IP만 접근 가능
    # 실제 배포 시 아래 allow 줄에 관리자 IP 대역을 추가하고 주석을 해제한다.
    location /api/v1/admin {
        allow 127.0.0.1;
        allow 10.0.0.0/8;       # Docker 내부 네트워크
        allow 172.16.0.0/12;    # Docker bridge 네트워크
        # allow 1.2.3.4;        # 관리자 고정 IP (실제 IP로 교체)
        deny all;
        proxy_pass http://backend:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 백엔드 API
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # 프론트엔드 정적 파일
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;  # SPA 라우팅
    }
}
