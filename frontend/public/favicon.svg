<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Navy background with rounded corners -->
  <rect width="512" height="512" rx="100" fill="#1b3a6e"/>
  <!-- Pole at bottom, centered -->
  <rect x="246" y="290" width="20" height="172" rx="5" fill="#ffffff"/>
  <!-- Coral circle border (signpost) -->
  <circle cx="256" cy="208" r="148" fill="#FF385C"/>
  <!-- White inner circle -->
  <circle cx="256" cy="208" r="116" fill="#ffffff"/>
  <!-- TU monogram, navy, centered in circle -->
  <text
    x="256"
    y="254"
    text-anchor="middle"
    dominant-baseline="auto"
    font-family="Arial Black, 'Arial Bold', Helvetica, sans-serif"
    font-weight="900"
    font-size="116"
    fill="#1b3a6e"
    letter-spacing="-4">TU</text>
</svg>
